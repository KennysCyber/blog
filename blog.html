    let activeFilter = 'all';
    let searchTerm = '';

    function renderPosts() {
      var grid = document.getElementById('postGrid');
      var filtered = POSTS.filter(function (p) {
        var matchCat = activeFilter === 'all' || p.category === activeFilter;
        var q = searchTerm.toLowerCase();
        var matchSearch = !q ||
          p.title.toLowerCase().includes(q) ||
          p.description.toLowerCase().includes(q) ||
          p.tags.some(function (t) { return t.toLowerCase().includes(q); });
        return matchCat && matchSearch;
      }).sort(function (a, b) {
        return (b.date || '').localeCompare(a.date || '');
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="no-results">No posts found. Try a different search or filter.</p>';
        return;
      }

      grid.innerHTML = filtered.map(function (p) {
        var label = CATEGORY_LABELS[p.category] || p.category;
        var tags = p.tags.slice(0, 2).map(function (t) {
          return '<span>#' + t + '</span>';
        }).join('');
        var imgHtml = p.thumb
          ? '<img src="' + p.thumb + '" alt="' + p.title + '" loading="lazy" />'
          : '<div style="height:160px;background:var(--bg-elevated);"></div>';
        return (
          '<a href="' + p.url + '" class="post-card">' +
            imgHtml +
            '<div class="post-card-body">' +
              '<span class="badge badge-' + p.category + '">' + label + '</span>' +
              '<h3>' + p.title + '</h3>' +
              '<p>' + p.description + '</p>' +
              '<div class="post-card-meta">' +
                '<span>' + (p.date || '') + '</span>' +
                '<span class="post-tags">' + tags + '</span>' +
              '</div>' +
            '</div>' +
          '</a>'
        );
      }).join('');
    }

    // Filter buttons
    document.getElementById('filterBar').addEventListener('click', function (e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelector('.filter-btn.active').classList.remove('active');
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderPosts();
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', function (e) {
      searchTerm = e.target.value;
      renderPosts();
    });

    // URL param pre-filter (from index category links)
    (function () {
      var params = new URLSearchParams(window.location.search);
      var preFilter = params.get('filter');
      if (preFilter && document.querySelector('[data-filter="' + preFilter + '"]')) {
        document.querySelector('.filter-btn.active').classList.remove('active');
        var btn = document.querySelector('[data-filter="' + preFilter + '"]');
        btn.classList.add('active');
        activeFilter = preFilter;
      }
    })();

    renderPosts();
